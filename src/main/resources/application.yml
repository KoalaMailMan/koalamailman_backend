server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true
      enabled: true
    forward-headers-strategy: framework #

app:
  oauth2:
    front-uri: ${FRONT_URI:https://ringdong.kr}
    back-uri: ${BACK_URI:https://ringdong.kr}
    domain: ${COOKIE_DOMAIN:ringdong.kr}

spring:
  application:
    name: koalamailman
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            client-name: Kakao
            scope:
              - profile_nickname
              - talk_message
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            client-name: Naver
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - name
              - email
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            client-name: Google
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - email
              - profile
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize?auth_type=reauthenticate
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?currentSchema=ringdongdb
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      jdbc:
        batch: 50
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  ai:
    retry:
      max-attempts: 1
    openai:
      api-key: ${OPENROUTER_API_KEY}
      base-url: https://openrouter.ai/api
      connect-timeout: 10s
      read-timeout: 30s
      chat:
        options:
          model: ${OPENROUTER_MODEL}
      embedding:
        api-key: ${OPENROUTER_API_KEY}
        base-url: https://openrouter.ai/api
        options:
          model: ${OPENROUTER_EMBEDDING_MODEL}

aws:
  region: ap-northeast-2
  access-key: ${AWS_ACCESS_KEY_ID}
  secret-key: ${AWS_SECRET_ACCESS_KEY}

mail:
  from: "코알라 우체부 <reminder@ringdong.kr>"
  fromName: "Koala Mailman"
  charset: "UTF-8"
  cta-uri: ${FRONT_URI:https://ringdong.kr}
  subject: "코알라 우체부가 편지를 전해요  🐨🪽✉️️"
  logo-url: "https://ringdong.kr/koala.svg"
  hero-url: ""
  tip: "중요한 건 꺾이지 않는 마음입니다."

jwt:
  access:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:3600000}
  refresh:
    secret: ${JWT_SECRET}
    expiration: ${JWT_REFRESH_EXPIRATION:3600000}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.hibernate.type.descriptor.sql: TRACE